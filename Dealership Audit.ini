Dealership Audit

Legend: ✅ = calculated & correct | ⚠️ = partially calculated (heuristic / incomplete) | no mark = not calculated yet

	•	Summary: This report presents a structured audit framework for automotive dealership websites. It covers dealership classifications, website page architecture, audit evaluation categories, key stakeholder needs, the modern car-buyer journey, critical digital gaps commonly found in dealership websites, SEO and AI-discoverability best practices.
	•	Dealership Classification:
	•	New Car Dealers (Franchise): Authorized dealers selling brand-new vehicles directly from manufacturers under franchise agreements.
	•	Used Car Dealers: Specialists in pre-owned vehicles must demonstrate trust, vehicle history, and competitive pricing online.
	•	Multi-Brand Dealers: Operate under multiple OEM franchises; digital audits must account for brand-specific page structures.
	•	Dealer Groups: Parent companies owning many dealerships across regions require consistent cross-site SEO and branding.
	•	EV-Focused Dealerships: Online or physical dealers specializing in electric vehicles; direct-to-consumer models are common.
